<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tiếng Trung cô Twy 🌸</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        :root { --pink: #FFC1CC; --green: #51CF66; --red: #FA5252; --white: #FFFDF5; --bg: #FFFDF5; --text: #FFC1CC; }
        body.dark { --bg: #2d2d2d; --text: #FFC1CC; }
        body { background: var(--bg); font-family: sans-serif; color: var(--text); text-align: center; padding: 20px; margin: 0; min-height: 100vh; padding-bottom: 80px; transition: 0.3s; }
        h1, h2, p, button, input, th, td { color: var(--text) !important; font-weight: bold; }
        #auth-box { position: fixed; top: 10px; left: 10px; padding: 8px 12px; border: 2px solid var(--text); border-radius: 10px; background: var(--bg); z-index: 1000; }
        .auth-btn { background: none; border: none; cursor: pointer; font-size: 14px; font-weight: bold; color: var(--text); padding: 5px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 900px; margin: 20px auto; }
        .card { background: var(--bg); padding: 20px; border-radius: 16px; border: 3px solid var(--text); cursor: pointer; font-size: 18px; }
        .tab-btn { padding: 10px 20px; border-radius: 12px; border: 3px solid var(--text); background: var(--bg); cursor: pointer; font-weight: bold; font-size: 16px; margin: 5px; }
        .opt-btn { width: 100%; padding: 15px; margin: 8px 0; border: 3px solid var(--text); background: var(--bg); cursor: pointer; font-size: 18px; border-radius: 12px; box-sizing: border-box; }
        .selected { background: #fce4ec; border: 4px solid var(--text); }
        input { padding: 15px; width: 80%; border: 3px solid var(--text); border-radius: 12px; font-size: 18px; margin: 15px 0; background: var(--bg); }
        .fc { width: 90%; max-width: 400px; height: 200px; border: 3px solid var(--text); border-radius: 20px; margin: 20px auto; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 28px; background: #fce4ec; }
        .q-box { margin-bottom: 30px; padding: 20px; border: 2px solid var(--text); border-radius: 15px; }
        .footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); padding: 15px; font-weight: bold; border-top: 2px solid var(--text); }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 2px solid var(--text); padding: 10px; font-size: 16px; }
        .mode-btn { position: fixed; top: 20px; right: 20px; font-size: 25px; cursor: pointer; border: none; background: none; }
    </style>
</head>

        const data = {}; for(let i=1; i<=20; i++) data[i] = parseData(rawData[i]);

        function speak(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='zh-CN'; window.speechSynthesis.speak(u); }
        function showStart() { document.getElementById('app-container').innerHTML = `<div id="start-screen"><div style="font-size: 60px;">🌸 🀄 🌸</div><h1>Đã nhớ học bài rồi hả em :)))</h1><p>Đánh bại tiếng Trung nào các em 🥊</p><button class="tab-btn" onclick="showDashboard()">BẮT ĐẦU HỌC 🌸</button></div>`; }
        function showDashboard() { document.getElementById('app-container').innerHTML = `<h1>Chào các bông hoa đến với tiếng trung cô Twy 🌸</h1><div id="dashboard" class="grid"></div>`; titles.forEach((t, i) => { let d = document.createElement('div'); d.className = 'card'; d.innerHTML = `Bài ${i+1}<br>${t}`; d.onclick = () => showLesson(i+1); document.getElementById('dashboard').appendChild(d); }); }
        function showLesson(id) { curId = id; curIdx = 0; const c = document.getElementById('app-container'); c.innerHTML = `<div id="tab-bar"></div><div id="content"></div><br><button class="tab-btn" onclick="showDashboard()">⬅ Danh sách bài</button>`; ["Từ vựng", "Flashcard", "Ôn tập", "Nghe", "Dịch", "Bài thi"].forEach(m => { let b = document.createElement('button'); b.className = 'tab-btn'; b.innerText = m; b.onclick = () => render(m); document.getElementById('tab-bar').appendChild(b); }); render("Từ vựng"); }
        function render(m) { const c = document.getElementById('content'), l = data[curId]; c.innerHTML = `<h2>${m}</h2><div id='v'></div>`; const v = document.getElementById('v'); if(m=='Từ vựng') v.innerHTML = `<table><tr><th>Hán tự</th><th>Pinyin</th><th>Nghĩa</th></tr>${l.map(i=>`<tr><td>${i.han}</td><td>${i.pinyin}</td><td>${i.mean}</td></tr>`).join('')}</table>`; else if(m=='Flashcard') v.innerHTML = `<div class='fc' onclick="this.innerHTML='${l[curIdx].pinyin}<br>${l[curIdx].mean}'">${l[curIdx].han}</div><button class='tab-btn' onclick="speak('${l[curIdx].han}')">🔊 Nghe</button><br><br><button class='tab-btn' onclick="curIdx=(curIdx-1+${l.length})%${l.length}; render('Flashcard')">◀</button><button class='tab-btn' onclick="curIdx=(curIdx+1)%${l.length}; render('Flashcard')">▶</button>`; else if(m=='Ôn tập') { let q=l[curIdx]; v.innerHTML = `<p style="font-size:30px">${q.han}</p>` + [...l.filter(x=>x.han!=q.han).sort(()=>0.5-Math.random()).slice(0,3), q].sort(()=>0.5-Math.random()).map(o=>`<button class='opt-btn' onclick="playSound(${o.mean==q.mean}); this.style.background='${o.mean==q.mean?'var(--green)':'var(--red)'}'">${o.mean}</button>`).join('') + `<br><button class='tab-btn' onclick="curIdx=(curIdx+1)%${l.length}; render('Ôn tập')">Tiếp theo ➡</button>`; } else if(m=='Nghe') v.innerHTML = `<p style="font-size: 22px;">🎧 Nghe âm thanh và viết Hán tự</p><button class='tab-btn' onclick="speak('${l[curIdx].han}')">🔊 Nghe</button><br><input id='i'><button class='tab-btn' onclick="let c=(document.getElementById('i').value=='${l[curIdx].han}'); playSound(c); document.getElementById('r').innerHTML=c?'✅':'❌'">Check</button><div id='r' style='font-size:30px'></div><br><button class='tab-btn' onclick="curIdx=(curIdx+1)%${l.length}; render('Nghe')">Tiếp theo ➡</button>`; else if(m=='Dịch') v.innerHTML = `<p style="font-size: 22px;">📝 Dịch nghĩa "${l[curIdx].mean}"</p><input id='i'><button class='tab-btn' onclick="let c=(document.getElementById('i').value=='${l[curIdx].han}'); playSound(c); document.getElementById('r').innerHTML=c?'✅':'❌'">Check</button><div id='r' style='font-size:30px'></div><br><button class='tab-btn' onclick="curIdx=(curIdx+1)%${l.length}; render('Dịch')">Tiếp theo ➡</button>`; else if(m=='Bài thi') { l.forEach((q,n) => v.innerHTML += `<div class='q-box' id='q-${n}'><p>${n+1}. Hán tự của "${q.mean}"?</p>` + [...l.filter(x=>x.han!=q.han).sort(()=>0.5-Math.random()).slice(0,3), q].sort(()=>0.5-Math.random()).map(o=>`<button class='opt-btn' onclick="this.parentElement.dataset.selected='${o.han}'; this.parentElement.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected')); this.classList.add('selected')">${o.han}</button>`).join('')+`<div class='res-c' style='display:none; color:var(--green); font-weight:bold; margin-top:10px;'>Đáp án: ${q.han}</div></div>`); v.innerHTML += `<button class='tab-btn' onclick="let s=0; document.querySelectorAll('.q-box').forEach((box,i)=>{ let sel=box.dataset.selected; let cor=data[curId][i].han; box.querySelector('.res-c').style.display='block'; box.querySelectorAll('.opt-btn').forEach(btn=>{ if(btn.innerText==cor){ btn.style.border='4px solid var(--green)'; } else if(btn.innerText==sel && sel!=cor){ btn.style.border='4px solid var(--red)'; } }); if(sel==cor) s++; }); this.outerHTML='<h2>Kết quả: '+(s/${l.length}*10).toFixed(1)+'/10 điểm</h2>'">NỘP BÀI</button>`; } }
        showStart();
    </script>
</body>
</html>
